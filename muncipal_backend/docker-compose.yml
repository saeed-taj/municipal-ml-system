version: "3.9"

services:
  backend:
    build: .
    container_name: municipal_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: municipal_db
    restart: always
    environment:
      POSTGRES_USER: wajahat
      POSTGRES_PASSWORD: municipal123
      POSTGRES_DB: municipal_db
    ports:
      - "5433:5432"